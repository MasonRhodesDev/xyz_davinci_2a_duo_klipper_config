[extruder]
step_pin: PB7
dir_pin: PB6
enable_pin: !PB8
microsteps: 16
rotation_distance: 32.8468
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA13
sensor_type: SEMITEC_104_GT2_ADC #ATC Semitec 104GT-2
adc_voltage: 4.096
# pullup_resistor: 1000  # 1.0A is 1k 1.0 is 4.7k with a 10k inline
# inline_resistor: 1000 # 1.0A is 0 1.0 is 10k
sensor_pin: PB20
smooth_time: 2.0
#control: pid
#pid_Kp=34.011 
#pid_Ki=1.631 
#pid_Kd=177.284
pwm_cycle_time: 0.0100
min_temp: -50 # set to 3 when working
max_temp: 300 # the semitec sensor is only good to 300c
min_extrude_temp: 170
pressure_advance = 0.0558
max_extrude_only_distance: 150.0

# Script to change back to the main extruder
[gcode_macro T0]
gcode:
    SET_GCODE_OFFSET X=0                        # Clear X offset
    ACTIVATE_EXTRUDER EXTRUDER=extruder

[extruder1]
step_pin: PB14
dir_pin: !PC28
enable_pin: !PB9
microsteps: 16
rotation_distance: 32.8080
full_steps_per_rotation: 200
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB12
sensor_type: SEMITEC_104_GT2_ADC #ATC Semitec 104GT-2
adc_voltage: 4.096
# pullup_resistor: 1000  # 1.0A is 1k 1.0 is 4.7k with a 10k inline
# inline_resistor: 1000 # 1.0A is 0 1.0 is 10k
sensor_pin: PB13
smooth_time: 2.0
#control: pid
#pid_Kp=34.011 
#pid_Ki=1.631 
#pid_Kd=177.284
pwm_cycle_time: 0.0100
min_temp: -50 # set to 3 when working
max_temp: 300 # the semitec sensor is only good to 300c
min_extrude_temp: 170
pressure_advance = 0.0558
max_extrude_only_distance: 150.0

# Script to activate second extruder
[gcode_macro T1]
gcode:
    SET_GCODE_OFFSET X=35.5                        # Account for different X offset
    ACTIVATE_EXTRUDER EXTRUDER=extruder1


[heater_bed]
heater_pin: PB16
sensor_type: DAVINCI_BED_ADC
sensor_pin: PB21
#control: watermark
adc_voltage: 4.096
smooth_time: 2.0
# control: pid
# pid_Kp=62.989 
# pid_Ki=0.630 
# pid_Kd=1575.501
pwm_cycle_time: 0.0100
min_temp: -100
max_temp: 130

[verify_heater heater_bed] 
check_gain_time: 5000
heating_gain: 1

[output_pin buzz]
pin: PB15
pwm: True
shutdown_value: 0
cycle_time: 0.001
scale: 1

[static_digital_output amber_led]
pins: !PB27

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu

[controller_fan system_fan]
pin: PC26
hardware_pwm: True
kick_start_time: 1.0
max_power: 1.0
idle_timeout: 300
idle_speed: 0.5
shutdown_speed: 1.0
heater: heater_bed, extruder1

[heater_fan hotend_fan]
pin: PD0
heater: extruder
heater_temp: 50.0
kick_start_time: 0.200

[fan ]
pin: PB11
kick_start_time: 0.200

[filament_switch_sensor Top_Cover]
switch_pin: PC24
pause_on_runout: False # good to have, but disabled for now

[output_pin Case_Light]
pin: PA12
value: 1

[output_pin LCD_Light]
pin: PB23
value: 1


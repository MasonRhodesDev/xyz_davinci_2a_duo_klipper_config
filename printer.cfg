[include fluidd.cfg]

[include macros/*.cfg]

[mcu]
serial: /dev/serial/by-id/usb-Klipper_sam3x8e_203120514D324C543235303139303231-if00
baud: 250000
restart_method: command

[virtual_sdcard]
path: /home/dietpi/xyzdavinci2aduo_data/gcodes
on_error_gcode: CANCEL_PRINT

# witdth 150mm
# depth 198mm
# height 198mm
[bed_screws]
screw1: 18, 29
screw2: 157, 29
screw3: 88,139

[force_move]
enable_force_move: false

[gcode_arcs]
resolution: 0.1

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1000
max_z_velocity: 5
max_z_accel: 100

[pause_resume]
recover_velocity: 50.

[display_status]

[stepper_x] # 150mm
step_pin: PD5
dir_pin: PD4	
enable_pin: !PD6
microsteps: 16 # number of microstep 16, 32
rotation_distance: 40
endstop_pin: ^PD7
position_endstop: 170
position_max: 170
position_min: -30
homing_speed: 50

[stepper_y] # 198mm
step_pin: PD9
dir_pin: !PD8
enable_pin: !PA0
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA1
position_endstop: 204
position_min: -3
position_max: 204
homing_speed: 50

[stepper_z] # 198mm
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB5
full_steps_per_rotation: 200
microsteps: 16
rotation_distance:1.25
endstop_pin: PB22
#position_endstop: 0
position_max: 198
position_min: -1
homing_speed: 5

[safe_z_home]
home_xy_position: 75, 99 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 10
move_to_previous: false

[gcode_macro UNSAFE_MOVE_Z]
description: Move the Z without homing
gcode:
    {% set MOVE_MM = params.MM|default(-30)|float * (-1) %}
    G90
    SET_KINEMATIC_POSITION Z={MOVE_MM}
    G0 Z0 F600

[firmware_retraction]
retract_length: 0
#   The length of filament (in mm) to retract when G10 is activated,
#   and to unretract when G11 is activated (but see
#   unretract_extra_length below). The default is 0 mm.
#retract_speed: 20
#   The speed of retraction, in mm/s. The default is 20 mm/s.
#unretract_extra_length: 0
#   The length (in mm) of *additional* filament to add when
#   unretracting.
#unretract_speed: 10
#   The speed of unretraction, in mm/s. The default is 10 mm/s.


# R2 is pullup
# R1 is inline
# VREF = 3.3V
# Hotend 1.0A
